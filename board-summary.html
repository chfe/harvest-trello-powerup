<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .section { padding: 8px 12px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--ds-text-subtlest, #5e6c84); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .section select { width: 100%; padding: 6px 8px; font-size: 13px; margin-bottom: 6px; border: 1px solid var(--ds-border-input, #dfe1e6); border-radius: 3px; background: var(--ds-background-input, #fafbfc); color: var(--ds-text, #172b4d); }

    .divider { height: 1px; background: var(--ds-border, #dfe1e6); margin: 0 12px; }

    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
    }
    .header img { width: 20px; height: 20px; }
    .header .project-name { font-size: 14px; font-weight: 600; color: var(--ds-text, #172b4d); }
    .header .client-name { font-size: 12px; color: var(--ds-text-subtlest, #5e6c84); }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 8px 12px;
    }
    .stat-card {
      background: var(--ds-background-neutral, #f4f5f7); border-radius: 8px;
      padding: 12px; text-align: center;
    }
    .stat-card .value { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .stat-card .label { font-size: 11px; color: var(--ds-text-subtlest, #5e6c84); margin-top: 2px; }
    .stat-card.unbilled .value { color: var(--ds-text-danger, #de350b); }
    .stat-card.unbilled { background: var(--ds-background-danger, #ffebe6); }
    .stat-card.amount .value { color: var(--ds-text-warning, #974f0c); }
    .stat-card.amount { background: var(--ds-background-warning, #fff7e6); }
    .stat-card.invoiced .value { color: var(--ds-text-success, #006644); }
    .stat-card.invoiced { background: var(--ds-background-success, #e3fcef); }
    .stat-card.total .value { color: var(--ds-text-information, #0052cc); }
    .stat-card.total { background: var(--ds-background-information, #deebff); }

    .breakdown { padding: 8px 12px; }
    .breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 13px;
    }
    .breakdown-row .label { color: var(--ds-text-subtle, #5e6c84); }
    .breakdown-row .value { font-weight: 600; color: var(--ds-text, #172b4d); }

    .loader { display: flex; align-items: center; justify-content: center; padding: 30px; gap: 8px; color: var(--ds-text-subtlest, #5e6c84); font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--ds-border, #dfe1e6); border-top-color: var(--ds-text-subtle, #5e6c84); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-text { padding: 16px 12px; text-align: center; font-size: 13px; color: var(--ds-text-subtlest, #5e6c84); }
    .error { padding: 16px 12px; text-align: center; color: var(--ds-text-danger, #de350b); font-size: 13px; }

    .unassigned-banner {
      display: flex; align-items: center; justify-content: space-between;
      margin: 8px 12px; padding: 8px 10px;
      background: var(--ds-background-warning, #fff7e6);
      border: 1px solid var(--ds-border-warning, #ffc400);
      border-radius: 6px; font-size: 13px;
    }
    .unassigned-banner .label { color: var(--ds-text-warning, #974f0c); font-weight: 600; }
    .unassigned-banner button {
      background: var(--ds-background-warning-bold, #ffab00); color: #172b4d;
      border: none; border-radius: 3px; padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .unassigned-banner button:hover { filter: brightness(0.95); }

    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 12px; font-size: 12px; color: var(--ds-text-subtle, #5e6c84);
      cursor: pointer; background: none; border: none;
    }
    .back-link:hover { color: var(--ds-text, #172b4d); }

    .entry-list { padding: 0 8px 60px 8px; }
    .entry-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px; border-bottom: 1px solid var(--ds-border, #dfe1e6);
      font-size: 12px;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-row input[type=checkbox] { margin-top: 3px; flex-shrink: 0; }
    .entry-row .meta { flex: 1; min-width: 0; }
    .entry-row .meta-top { display: flex; gap: 6px; align-items: baseline; margin-bottom: 2px; }
    .entry-row .date { color: var(--ds-text-subtlest, #5e6c84); font-size: 11px; }
    .entry-row .hours { font-weight: 600; color: var(--ds-text, #172b4d); }
    .entry-row .task { color: var(--ds-text-subtle, #5e6c84); font-size: 11px; }
    .entry-row .notes { color: var(--ds-text, #172b4d); word-wrap: break-word; white-space: pre-wrap; }
    .entry-row .actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .entry-row .actions button {
      background: var(--ds-background-neutral, #f4f5f7); color: var(--ds-text, #172b4d);
      border: 1px solid var(--ds-border, #dfe1e6); border-radius: 3px;
      padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .entry-row .actions button:hover { background: var(--ds-background-neutral-hovered, #ebecf0); }
    .entry-row.error-row { background: var(--ds-background-danger, #ffebe6); }
    .entry-row .row-error { color: var(--ds-text-danger, #de350b); font-size: 11px; margin-top: 2px; }

    .attach-picker {
      margin-top: 6px; padding: 6px; background: var(--ds-background-neutral, #f4f5f7);
      border-radius: 4px; display: flex; gap: 4px;
    }
    .attach-picker input {
      flex: 1; padding: 4px 6px; font-size: 12px;
      border: 1px solid var(--ds-border-input, #dfe1e6); border-radius: 3px;
      background: var(--ds-background-input, #fafbfc); color: var(--ds-text, #172b4d);
    }
    .attach-picker button {
      padding: 4px 10px; font-size: 11px; background: var(--ds-background-brand-bold, #0052cc);
      color: white; border: none; border-radius: 3px; cursor: pointer;
    }
    .attach-picker button:disabled { background: #a5adba; cursor: not-allowed; }

    .selection-footer {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--ds-background-default, #ffffff);
      border-top: 1px solid var(--ds-border, #dfe1e6);
      padding: 8px 12px; display: flex; gap: 6px; justify-content: space-between;
      align-items: center; font-size: 12px;
      box-shadow: 0 -2px 6px rgba(9, 30, 66, 0.08);
    }
    .selection-footer .count { color: var(--ds-text-subtle, #5e6c84); font-weight: 600; }
    .selection-footer .buttons { display: flex; gap: 6px; }
    .selection-footer button {
      padding: 5px 10px; font-size: 12px; border-radius: 3px; border: none; cursor: pointer;
    }
    .selection-footer .attach-btn { background: var(--ds-background-brand-bold, #0052cc); color: white; }
    .selection-footer .create-btn { background: var(--ds-background-success-bold, #36b37e); color: white; }

    .inline-form { padding: 8px 12px; background: var(--ds-background-neutral, #f4f5f7); margin: 0 8px 8px; border-radius: 4px; }
    .inline-form label { display: block; font-size: 11px; color: var(--ds-text-subtlest, #5e6c84); margin-bottom: 4px; }
    .inline-form input {
      width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 13px;
      border: 1px solid var(--ds-border-input, #dfe1e6); border-radius: 3px;
      background: var(--ds-background-input, #fafbfc); color: var(--ds-text, #172b4d);
      margin-bottom: 6px;
    }
    .inline-form .row { display: flex; gap: 6px; }
    .inline-form .row button {
      padding: 5px 10px; font-size: 12px; border-radius: 3px; border: none; cursor: pointer;
    }
    .inline-form .primary { background: var(--ds-background-brand-bold, #0052cc); color: white; }
    .inline-form .secondary { background: var(--ds-background-neutral, #f4f5f7); color: var(--ds-text, #172b4d); border: 1px solid var(--ds-border, #dfe1e6); }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="js/harvest-api.js"></script>
</head>
<body>
  <div id="content">
    <div class="loader"><div class="spinner"></div> Loading…</div>
  </div>

  <script src="js/board-summary.js"></script>
</body>
</html>
