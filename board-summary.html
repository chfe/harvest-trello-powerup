<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 12px 8px;
    }
    .header img { width: 20px; height: 20px; }
    .header .project-name { font-size: 14px; font-weight: 600; color: var(--ds-text, #172b4d); }
    .header .client-name { font-size: 12px; color: var(--ds-text-subtlest, #5e6c84); }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 8px 12px 12px;
    }
    .stat-card {
      background: var(--ds-background-neutral, #f4f5f7); border-radius: 8px;
      padding: 12px; text-align: center;
    }
    .stat-card .value { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .stat-card .label { font-size: 11px; color: var(--ds-text-subtlest, #5e6c84); margin-top: 2px; }
    .stat-card.unbilled .value { color: var(--ds-text-danger, #de350b); }
    .stat-card.unbilled { background: var(--ds-background-danger, #ffebe6); }
    .stat-card.amount .value { color: var(--ds-text-warning, #974f0c); }
    .stat-card.amount { background: var(--ds-background-warning, #fff7e6); }
    .stat-card.invoiced .value { color: var(--ds-text-success, #006644); }
    .stat-card.invoiced { background: var(--ds-background-success, #e3fcef); }
    .stat-card.total .value { color: var(--ds-text-information, #0052cc); }
    .stat-card.total { background: var(--ds-background-information, #deebff); }

    .divider { height: 1px; background: var(--ds-border, #dfe1e6); margin: 0 12px; }

    .breakdown { padding: 12px; }
    .breakdown-title { font-size: 11px; font-weight: 600; color: var(--ds-text-subtlest, #5e6c84); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; font-size: 13px;
    }
    .breakdown-row .label { color: var(--ds-text-subtle, #5e6c84); }
    .breakdown-row .value { font-weight: 600; color: var(--ds-text, #172b4d); }

    .actions { padding: 8px 12px 12px; }
    .btn-settings {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 6px; border: 1px solid var(--ds-border, #dfe1e6);
      border-radius: 3px; background: var(--ds-background-neutral, #f4f5f7);
      color: var(--ds-text-subtle, #5e6c84); font-size: 12px; cursor: pointer;
      text-decoration: none;
    }
    .btn-settings:hover { background: var(--ds-background-neutral-hovered, #ebecf0); }

    .loader { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; color: var(--ds-text-subtlest, #5e6c84); font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--ds-border, #dfe1e6); border-top-color: var(--ds-text-subtle, #5e6c84); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { padding: 24px 12px; text-align: center; }
    .empty-text { font-size: 13px; color: var(--ds-text-subtlest, #5e6c84); margin-bottom: 12px; }

    .error { padding: 24px 12px; text-align: center; color: var(--ds-text-danger, #de350b); font-size: 13px; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="js/harvest-api.js"></script>
</head>
<body>
  <div id="content">
    <div class="loader"><div class="spinner"></div> Loading project data…</div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    function formatCHF(amount) {
      var parts = amount.toFixed(2).split('.');
      var intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, "'");
      return "CHF " + intPart + '.' + parts[1];
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    Promise.all([
      t.get('member', 'private', 'harvestCredentials', null),
      t.get('board', 'shared', 'harvestProjectId', null)
    ]).then(function(results) {
      var creds = results[0];
      var projectId = results[1];
      var container = document.getElementById('content');

      if (!creds || !creds.token) {
        container.innerHTML =
          '<div class="empty">' +
            '<div class="empty-text">No Harvest credentials configured.</div>' +
            '<button class="mod-primary" onclick="openSettings()" style="width:100%">Set up Harvest</button>' +
          '</div>';
        return;
      }

      if (!projectId) {
        container.innerHTML =
          '<div class="empty">' +
            '<div class="empty-text">No Harvest project linked to this board.<br>Select a project in settings to see totals.</div>' +
            '<button class="mod-primary" onclick="openSettings()" style="width:100%">Link Project</button>' +
          '</div>';
        return;
      }

      // Fetch project details + uninvoiced entries
      Promise.all([
        HarvestAPI.request('/projects/' + projectId, creds.token, creds.accountId),
        HarvestAPI.request('/time_entries', creds.token, creds.accountId, { project_id: projectId, per_page: 100 })
      ]).then(function(data) {
        var project = data[0];
        var entriesData = data[1];

        if (!project) {
          container.innerHTML = '<div class="error">Could not load project.</div>';
          return;
        }

        var entries = (entriesData && entriesData.time_entries) ? entriesData.time_entries : [];

        var totalH = 0, billH = 0, nonBillH = 0, invoicedH = 0, uninvoicedH = 0;
        var uninvoicedAmount = 0, invoicedAmount = 0;
        entries.forEach(function(e) {
          var h = e.rounded_hours || 0;
          var rate = e.billable_rate || 0;
          totalH += h;
          if (e.billable) billH += h; else nonBillH += h;
          if (e.is_billed) {
            invoicedH += h;
            invoicedAmount += h * rate;
          } else {
            uninvoicedH += h;
            uninvoicedAmount += h * rate;
          }
        });

        var clientName = project.client ? escapeHtml(project.client.name) : '';
        var projectName = escapeHtml(project.name);

        var html = '';

        // Header
        html += '<div class="header">';
        html += '<img src="./img/harvest-logo-orange.svg" alt="">';
        html += '<div>';
        if (clientName) html += '<div class="client-name">' + clientName + '</div>';
        html += '<div class="project-name">' + projectName + '</div>';
        html += '</div></div>';

        // Stats grid
        html += '<div class="stats">';
        html += '<div class="stat-card unbilled"><div class="value">' + uninvoicedH.toFixed(1) + 'h</div><div class="label">Unbilled</div></div>';
        html += '<div class="stat-card amount"><div class="value">' + formatCHF(uninvoicedAmount) + '</div><div class="label">Unbilled Amount</div></div>';
        html += '<div class="stat-card invoiced"><div class="value">' + invoicedH.toFixed(1) + 'h</div><div class="label">Invoiced</div></div>';
        html += '<div class="stat-card total"><div class="value">' + totalH.toFixed(1) + 'h</div><div class="label">Total</div></div>';
        html += '</div>';

        // Breakdown
        html += '<div class="divider"></div>';
        html += '<div class="breakdown">';
        html += '<div class="breakdown-title">Breakdown</div>';
        html += '<div class="breakdown-row"><span class="label">Billable</span><span class="value">' + billH.toFixed(1) + 'h</span></div>';
        if (nonBillH > 0) {
          html += '<div class="breakdown-row"><span class="label">Non-billable</span><span class="value">' + nonBillH.toFixed(1) + 'h</span></div>';
        }
        html += '<div class="breakdown-row"><span class="label">Time entries</span><span class="value">' + entries.length + '</span></div>';
        if (project.budget) {
          var budgetType = project.budget_by === 'project' ? 'h' : '';
          html += '<div class="breakdown-row"><span class="label">Budget</span><span class="value">' + project.budget + budgetType + '</span></div>';
          if (project.budget_by === 'project') {
            var pct = Math.round((totalH / project.budget) * 100);
            html += '<div class="breakdown-row"><span class="label">Used</span><span class="value">' + pct + '%</span></div>';
          }
        }
        html += '</div>';

        // Settings link
        html += '<div class="divider"></div>';
        html += '<div class="actions">';
        html += '<a class="btn-settings" href="#" onclick="openSettings(); return false;">⚙ Settings</a>';
        html += '</div>';

        container.innerHTML = html;
      }).catch(function() {
        container.innerHTML = '<div class="error">Could not load Harvest data. Please try again.</div>';
      });

    }).catch(function(err) {
      document.getElementById('content').innerHTML = '<div class="error">Error: ' + escapeHtml(err.message) + '</div>';
    });

    function openSettings() {
      t.popup({
        title: 'Harvest Settings',
        url: './settings.html',
        height: 400
      });
    }
  </script>
</body>
</html>
