<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #333; padding: 8px; }
    .loading { color: #999; padding: 12px; text-align: center; }
    .no-config { color: #999; padding: 12px; text-align: center; }
    .no-entries { color: #999; padding: 12px; text-align: center; font-style: italic; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 10px; text-transform: uppercase; color: #999; padding: 4px 8px; border-bottom: 1px solid #eee; }
    th.right { text-align: right; }
    td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
    td.right { text-align: right; }
    td.hours { font-weight: 600; text-align: right; white-space: nowrap; }
    td.date { color: #999; white-space: nowrap; font-size: 12px; }
    td.task { color: #666; font-size: 12px; }
    td.notes { color: #333; }

    .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .badge-billable { background: #e3f2fd; color: #1565c0; }
    .badge-nonbillable { background: #fff3e0; color: #e65100; }

    .summary { display: flex; gap: 16px; padding: 8px; background: #f8f9fa; border-radius: 4px; margin-bottom: 8px; }
    .summary-item { text-align: center; }
    .summary-item .value { font-size: 18px; font-weight: 700; }
    .summary-item .label { font-size: 10px; color: #999; text-transform: uppercase; }
    .summary-item.billable .value { color: #1565c0; }
    .summary-item.total .value { color: #2e7d32; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="js/harvest-api.js"></script>
</head>
<body>
  <div id="content"><div class="loading">Loading Harvest data...</div></div>

  <script>
    const t = TrelloPowerUp.iframe();

    async function render() {
      const container = document.getElementById('content');

      try {
        const creds = await t.get('member', 'private', 'harvestCredentials', null);
        if (!creds || !creds.token) {
          container.innerHTML = '<div class="no-config">Please configure Harvest in board settings.</div>';
          return;
        }

        const card = await t.card('shortLink', 'name');
        const shortLink = card.shortLink;

        const entries = await HarvestAPI.getEntriesForCard(creds.token, creds.accountId, shortLink);

        if (!entries || entries.length === 0) {
          container.innerHTML = '<div class="no-entries">No time entries for this card.</div>';
          t.sizeTo('#content').catch(() => {});
          return;
        }

        // Calculate totals
        let totalHours = 0, billableHours = 0, nonBillableHours = 0, totalAmount = 0;
        entries.forEach(e => {
          totalHours += e.rounded_hours || 0;
          if (e.billable) {
            billableHours += e.rounded_hours || 0;
            totalAmount += (e.billable_rate || 0) * (e.rounded_hours || 0);
          } else {
            nonBillableHours += e.rounded_hours || 0;
          }
        });

        // Sort by date descending
        entries.sort((a, b) => b.spent_date.localeCompare(a.spent_date));

        let html = '';

        // Summary bar
        html += `<div class="summary">
          <div class="summary-item total">
            <div class="value">${totalHours.toFixed(2)}h</div>
            <div class="label">Total</div>
          </div>
          <div class="summary-item billable">
            <div class="value">${billableHours.toFixed(2)}h</div>
            <div class="label">Billable</div>
          </div>`;

        if (nonBillableHours > 0) {
          html += `<div class="summary-item">
            <div class="value">${nonBillableHours.toFixed(2)}h</div>
            <div class="label">Non-billable</div>
          </div>`;
        }

        html += `<div class="summary-item">
            <div class="value">${entries.length}</div>
            <div class="label">Entries</div>
          </div>
        </div>`;

        // Entries table
        html += `<table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Task</th>
              <th>Notes</th>
              <th class="right">Hours</th>
              <th></th>
            </tr>
          </thead>
          <tbody>`;

        entries.forEach(e => {
          const date = new Date(e.spent_date + 'T00:00:00').toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });
          const task = e.task ? e.task.name : '';
          const notes = e.notes || '';
          const hours = (e.rounded_hours || 0).toFixed(2);
          const badge = e.billable
            ? '<span class="badge badge-billable">billable</span>'
            : '<span class="badge badge-nonbillable">non-billable</span>';

          html += `<tr>
            <td class="date">${date}</td>
            <td class="task">${task}</td>
            <td class="notes">${notes.length > 60 ? notes.substring(0, 60) + '...' : notes}</td>
            <td class="hours">${hours}h</td>
            <td>${badge}</td>
          </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
        t.sizeTo('#content').catch(() => {});
      } catch (err) {
        container.innerHTML = `<div class="no-config">Error: ${err.message}</div>`;
      }
    }

    render();
  </script>
</body>
</html>
