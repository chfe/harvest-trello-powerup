<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.min.css">
  <style>
    /* Tom Select overrides */
    .ts-wrapper .ts-control {
      padding: 8px 12px !important; font-size: 14px; border-radius: 6px !important;
      border: 1px solid var(--ds-border-input, #dfe1e6) !important;
      background: var(--ds-background-input, #22272b) !important;
      color: var(--ds-text, #b6c2cf) !important;
    }
    .ts-wrapper.focus .ts-control {
      border-color: var(--ds-border-focused, #579dff) !important;
      box-shadow: 0 0 0 1px var(--ds-border-focused, #579dff) !important;
    }
    .ts-wrapper .ts-control input,
    .ts-wrapper .ts-control input::placeholder {
      color: var(--ds-text, #b6c2cf) !important;
      background: transparent !important;
    }
    .ts-dropdown {
      border-radius: 6px;
      border: 1px solid var(--ds-border, #3d474f);
      background: var(--ds-background-overlay, #282e33);
    }
    .ts-dropdown .option {
      padding: 8px 12px; font-size: 13px;
      color: var(--ds-text, #b6c2cf);
    }
    .ts-dropdown .active {
      background: var(--ds-background-selected, #3d474f);
      color: var(--ds-text, #fff);
    }
    .ts-dropdown .highlight {
      background: rgba(87, 157, 255, 0.2);
    }
  </style>
  <style>
    body { margin: 0; padding: 0; }
    .form { padding: 12px 20px; }
    .field { margin-bottom: 8px; }
    .field label { display: none; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid var(--ds-border-input, #dfe1e6); border-radius: 6px;
      background: var(--ds-background-input, #fafbfc); color: var(--ds-text, #172b4d);
      box-sizing: border-box;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--ds-border-focused, #0079bf); outline: none;
      box-shadow: 0 0 0 1px var(--ds-border-focused, #0079bf);
    }
    .field textarea { resize: vertical; min-height: 60px; }

    .row { display: flex; gap: 10px; align-items: start; }
    .row .field { margin-bottom: 8px; }

    .notes-hours { display: flex; gap: 10px; margin-bottom: 8px; }
    .notes-hours .field { margin-bottom: 0; }
    .notes-hours .field-notes { flex: 1; }
    .notes-hours .field-hours { width: 90px; }
    .notes-hours .field-hours input {
      font-size: 20px; font-weight: 600; text-align: center; padding: 10px 8px;
    }

    .field-half { width: 50%; }

    .btn-delete {
      background: none; border: 1px solid var(--ds-border, #dfe1e6);
      color: var(--ds-text-danger, #de350b); border-radius: 6px; padding: 10px 16px;
      font-size: 14px; cursor: pointer;
    }
    .btn-delete:hover { background: var(--ds-background-danger, #ffebe6); }

    .context { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--ds-border, #dfe1e6); font-size: 12px; color: var(--ds-text-subtlest, #5e6c84); }
    .context strong { color: var(--ds-text, #172b4d); }

    .status { margin-top: 8px; font-size: 12px; text-align: center; }
    .status.error { color: var(--ds-text-danger, #de350b); }
    .status.success { color: var(--ds-text-success, #006644); }
    .loader { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; color: var(--ds-text-subtlest, #5e6c84); font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--ds-border, #dfe1e6); border-top-color: var(--ds-text-subtle, #5e6c84); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-project { padding: 20px; text-align: center; font-size: 13px; color: var(--ds-text-subtlest, #5e6c84); }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.base.min.js"></script>
  <script src="js/harvest-api.js"></script>
</head>
<body>
  <div id="content">
    <div class="loader"><div class="spinner"></div> Loading…</div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var container = document.getElementById('content');

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') t.closeModal();
      if (e.key === 'Enter' && !e.shiftKey && document.activeElement.tagName !== 'TEXTAREA') {
        // Don't save if a Tom Select dropdown is open
        var openDropdown = document.querySelector('.ts-dropdown:not([style*="display: none"])');
        if (openDropdown) return;
        e.preventDefault();
        var btn = document.getElementById('btnSave');
        if (btn) btn.click();
      }
    });

    var params = new URLSearchParams(window.location.search);
    var entryId = params.get('entryId');
    var isEdit = !!entryId;
    var card = {
      shortLink: params.get('shortLink'),
      name: params.get('cardName') || '',
      url: params.get('cardUrl') || ''
    };

    var allProjects = [];

    Promise.all([
      t.get('member', 'private', 'harvestCredentials', null),
      t.get('board', 'shared', 'harvestProjectId', null),
      card.shortLink ? Promise.resolve(card) : t.card('shortLink', 'name', 'url')
    ]).then(function(results) {
      var creds = results[0];
      var projectId = results[1];
      card = results[2];

      if (!creds || !creds.token) {
        container.innerHTML = '<div class="no-project">No Harvest credentials configured.</div>';
        return;
      }
      if (!projectId) {
        container.innerHTML = '<div class="no-project">No Harvest project linked to this board.<br>Set it in Harvest Settings (board button).</div>';
        return;
      }

      var entryPromise = isEdit
        ? HarvestAPI.getEntry(creds.token, creds.accountId, entryId)
        : Promise.resolve(null);

      entryPromise.then(function(entry) {
        var taskProjectId = (entry && entry.project) ? entry.project.id : projectId;
        return Promise.all([
          HarvestAPI.getTaskAssignments(creds.token, creds.accountId, taskProjectId),
          HarvestAPI.request('/projects', creds.token, creds.accountId, { is_active: true, per_page: 100 })
        ]).then(function(res) {
          allProjects = (res[1] && res[1].projects) ? res[1].projects.slice().sort(function(a, b) {
            var aName = (a.client ? a.client.name + ' — ' + a.name : a.name).toLowerCase();
            var bName = (b.client ? b.client.name + ' — ' + b.name : b.name).toLowerCase();
            return aName.localeCompare(bName, 'de');
          }) : [];
          return { tasks: res[0], entry: entry, currentProjectId: taskProjectId };
        });
      }).then(function(data) {
        if (!data.tasks || data.tasks.length === 0) {
          container.innerHTML = '<div class="no-project">No tasks found for this project.</div>';
          return;
        }
        renderForm(creds, projectId, card, data.tasks, data.entry, data.currentProjectId);
      });
    });

    function renderForm(creds, boardProjectId, card, tasks, entry, currentProjectId) {
      var today = new Date().toISOString().split('T')[0];

      var html = '<div class="form">';

      // Project
      html += '<div class="field"><select id="project_id">';
      allProjects.forEach(function(p) {
        var label = p.client ? escapeHtml(p.client.name) + ' — ' + escapeHtml(p.name) : escapeHtml(p.name);
        var sel = (String(p.id) === String(currentProjectId)) ? ' selected' : '';
        html += '<option value="' + p.id + '"' + sel + '>' + label + '</option>';
      });
      html += '</select></div>';

      // Task
      html += '<div class="field"><select id="task_id">';
      tasks.forEach(function(task) {
        var sel = (entry && entry.task && entry.task.id === task.id) ? ' selected' : '';
        html += '<option value="' + task.id + '"' + sel + '>' + escapeHtml(task.name) + '</option>';
      });
      html += '</select></div>';

      // Notes + Hours
      html += '<div class="notes-hours">';
      html += '<div class="field field-notes">';
      html += '<textarea id="notes" placeholder="What did you work on?">' + (entry ? escapeHtml(entry.notes || '') : escapeHtml(card.name)) + '</textarea></div>';
      html += '<div class="field field-hours">';
      html += '<input type="number" id="hours" step="0.25" min="0" value="' + (entry ? (entry.hours || '') : '0.5') + '"></div>';
      html += '</div>';

      // Date + Save button row
      html += '<div class="row">';
      html += '<div class="field field-half"><input type="date" id="spent_date" value="' + (entry ? entry.spent_date : today) + '"></div>';
      html += '<div class="field" style="flex:1"><button class="mod-primary" id="btnSave" style="width:100%;padding:10px 16px;font-size:14px;">' + (isEdit ? 'Update Entry' : 'Save Entry') + '</button></div>';
      html += '</div>';

      // Delete (separate, less prominent)
      if (isEdit) {
        html += '<div style="text-align:right;margin-top:4px;"><button class="btn-delete" id="btnDelete">Delete Entry</button></div>';
      }

      html += '<div id="status" class="status"></div>';

      if (card.name) {
        html += '<div class="context">Card: <strong>' + escapeHtml(card.name) + '</strong></div>';
      }

      html += '</div>';

      container.innerHTML = html;

      // Init Tom Select on dropdowns
      var tsConfig = { maxOptions: null, loadThrottle: 0, refreshThrottle: 0 };
      var projectSelect = new TomSelect('#project_id', tsConfig);
      var taskSelect = new TomSelect('#task_id', tsConfig);

      setTimeout(function() { document.getElementById('hours').focus(); document.getElementById('hours').select(); }, 150);

      // Project change → reload tasks
      projectSelect.on('change', function(newProjectId) {
        taskSelect.clear();
        taskSelect.clearOptions();
        taskSelect.addOption({ value: '', text: 'Loading…' });
        taskSelect.refreshOptions(false);
        HarvestAPI.getTaskAssignments(creds.token, creds.accountId, newProjectId).then(function(newTasks) {
          taskSelect.clearOptions();
          newTasks.forEach(function(task) {
            taskSelect.addOption({ value: task.id, text: task.name });
          });
          if (newTasks.length > 0) taskSelect.setValue(newTasks[0].id);
          taskSelect.refreshOptions(false);
        });
      });

      // Save handler
      document.getElementById('btnSave').addEventListener('click', function() {
        var spent_date = document.getElementById('spent_date').value;
        var hours = parseFloat(document.getElementById('hours').value);
        var task_id = parseInt(document.getElementById('task_id').value);
        var project_id = parseInt(document.getElementById('project_id').value);
        var notes = document.getElementById('notes').value.trim();
        var status = document.getElementById('status');

        if (!spent_date || !hours || hours <= 0) {
          status.className = 'status error';
          status.textContent = 'Please enter date and hours.';
          return;
        }

        status.className = 'status';
        status.textContent = 'Saving…';

        var payload = {
          spent_date: spent_date,
          hours: hours,
          task_id: task_id,
          project_id: project_id,
          notes: notes
        };

        if (!isEdit) {
          payload.external_reference = {
            id: card.shortLink,
            group_id: 'trello',
            permalink: card.url,
            service: 'trello.com',
            service_icon_url: 'https://trello.com/favicon.ico'
          };
        }

        var promise = isEdit
          ? HarvestAPI.updateEntry(creds.token, creds.accountId, entryId, payload)
          : HarvestAPI.createEntry(creds.token, creds.accountId, payload);

        promise.then(function() {
          status.className = 'status success';
          status.textContent = isEdit ? 'Updated!' : 'Created!';
          setTimeout(function() {
            t.set('card', 'shared', 'harvestLastUpdated', Date.now())
              .then(function() { t.closeModal(); });
          }, 800);
        }).catch(function(err) {
          status.className = 'status error';
          status.textContent = 'Error: ' + err.message;
        });
      });

      // Delete handler
      if (isEdit) {
        document.getElementById('btnDelete').addEventListener('click', function() {
          if (!confirm('Delete this time entry?')) return;
          var status = document.getElementById('status');
          status.className = 'status';
          status.textContent = 'Deleting…';

          HarvestAPI.deleteEntry(creds.token, creds.accountId, entryId).then(function() {
            status.className = 'status success';
            status.textContent = 'Deleted!';
            setTimeout(function() {
              t.set('card', 'shared', 'harvestLastUpdated', Date.now())
                .then(function() { t.closeModal(); });
            }, 800);
          }).catch(function(err) {
            status.className = 'status error';
            status.textContent = 'Error: ' + err.message;
          });
        });
      }
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
