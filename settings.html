<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div style="padding: 8px;">
    <p><strong>Harvest Account ID</strong></p>
    <input type="text" id="accountId" placeholder="e.g. 123456" style="width:100%; margin-bottom:8px;">

    <p><strong>Personal Access Token</strong></p>
    <input type="password" id="token" placeholder="Your Harvest API token" style="width:100%; margin-bottom:12px;">

    <button class="mod-primary" id="save" style="width:100%">Save & Test</button>
    <p id="status" style="margin-top:8px; font-size:12px;"></p>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    t.get('member', 'private', 'harvestCredentials', null).then(function(data) {
      if (data) {
        document.getElementById('accountId').value = data.accountId || '';
        document.getElementById('token').value = data.token || '';
      }
    });

    document.getElementById('save').addEventListener('click', function() {
      var token = document.getElementById('token').value.trim();
      var accountId = document.getElementById('accountId').value.trim();
      var status = document.getElementById('status');

      if (!token || !accountId) {
        status.textContent = 'Please fill in both fields.';
        status.style.color = 'red';
        return;
      }

      fetch('https://api.harvestapp.com/v2/users/me', {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Harvest-Account-Id': accountId,
          'User-Agent': 'HarvestTrelloPowerUp'
        }
      }).then(function(res) {
        if (!res.ok) throw new Error('Invalid credentials');
        return res.json();
      }).then(function(user) {
        return t.set('member', 'private', 'harvestCredentials', { token: token, accountId: accountId }).then(function() {
          status.textContent = 'Connected as ' + user.first_name + ' ' + user.last_name + ' ✓';
          status.style.color = 'green';
          setTimeout(function() { t.closePopup(); }, 1500);
        });
      }).catch(function(err) {
        status.textContent = 'Error: ' + err.message;
        status.style.color = 'red';
      });
    });
  </script>
</body>
</html>
