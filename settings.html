<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div style="padding: 8px;">
    <p><strong>Harvest Account ID</strong></p>
    <input type="text" id="accountId" placeholder="e.g. 123456" style="width:100%; margin-bottom:8px;">

    <p><strong>Personal Access Token</strong></p>
    <input type="password" id="token" placeholder="Your Harvest API token" style="width:100%; margin-bottom:12px;">

    <p><strong>Harvest Project</strong> <span style="font-size:11px; color:#999;">(for board-level totals)</span></p>
    <select id="projectId" style="width:100%; margin-bottom:12px; padding:6px;">
      <option value="">— none —</option>
    </select>

    <p><strong>Card Badge</strong></p>
    <select id="visibility" style="width:100%; margin-bottom:12px; padding:6px;">
      <option value="full">Show hours (e.g. 2.5h)</option>
      <option value="minimal">Show only ✓ tracked</option>
      <option value="hidden">Hidden</option>
    </select>

    <button class="mod-primary" id="save" style="width:100%">Save & Test</button>
    <p id="status" style="margin-top:8px; font-size:12px;"></p>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    function loadProjects(token, accountId, selectedId) {
      if (!token || !accountId) return;
      var select = document.getElementById('projectId');

      fetch('https://api.harvestapp.com/v2/projects?is_active=true&per_page=100', {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Harvest-Account-Id': accountId,
          'User-Agent': 'HarvestTrelloPowerUp'
        }
      }).then(function(res) {
        if (!res.ok) return;
        return res.json();
      }).then(function(data) {
        if (!data || !data.projects) return;
        select.innerHTML = '<option value="">— none —</option>';
        var projects = data.projects.slice().sort(function(a, b) {
          var aName = (a.client ? a.client.name + ' — ' + a.name : a.name).toLowerCase();
          var bName = (b.client ? b.client.name + ' — ' + b.name : b.name).toLowerCase();
          return aName.localeCompare(bName, 'de');
        });
        projects.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.client ? p.client.name + ' — ' + p.name : p.name;
          if (selectedId && String(p.id) === String(selectedId)) opt.selected = true;
          select.appendChild(opt);
        });
      });
    }

    Promise.all([
      t.get('member', 'private', 'harvestCredentials', null),
      t.get('board', 'shared', 'badgeVisibility', 'full'),
      t.get('board', 'shared', 'harvestProjectId', null)
    ]).then(function(results) {
      var data = results[0];
      var vis = results[1];
      var projId = results[2];
      if (data) {
        document.getElementById('accountId').value = data.accountId || '';
        document.getElementById('token').value = data.token || '';
        loadProjects(data.token, data.accountId, projId);
      }
      document.getElementById('visibility').value = vis;
    });

    document.getElementById('save').addEventListener('click', function() {
      var token = document.getElementById('token').value.trim();
      var accountId = document.getElementById('accountId').value.trim();
      var visibility = document.getElementById('visibility').value;
      var projectId = document.getElementById('projectId').value;
      var status = document.getElementById('status');

      if (!token || !accountId) {
        status.textContent = 'Please fill in both fields.';
        status.style.color = 'red';
        return;
      }

      fetch('https://api.harvestapp.com/v2/users/me', {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Harvest-Account-Id': accountId,
          'User-Agent': 'HarvestTrelloPowerUp'
        }
      }).then(function(res) {
        if (!res.ok) throw new Error('Invalid credentials');
        return res.json();
      }).then(function(user) {
        return Promise.all([
          t.set('member', 'private', 'harvestCredentials', { token: token, accountId: accountId }),
          t.set('board', 'shared', 'badgeVisibility', visibility),
          t.set('board', 'shared', 'harvestProjectId', projectId || null)
        ]).then(function() {
          status.textContent = 'Connected as ' + user.first_name + ' ' + user.last_name + ' ✓';
          status.style.color = 'green';
          setTimeout(function() { t.closePopup(); }, 1500);
        });
      }).catch(function(err) {
        status.textContent = 'Error: ' + err.message;
        status.style.color = 'red';
      });
    });
  </script>
</body>
</html>
